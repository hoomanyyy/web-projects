<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
</head>
<body class="w[100%] bg-gray-600 gap-20  flex flex-col">
    
    <div class="bg-gray-900 text-white p-4 text-center">
        <h1>hello and welcome to hooman chatroom</h1>
    </div>
    <br>
    <br>
    <div class="bg-slate-800 p-4 w-40 text-white text-center self-center" id="online">
        
    </div>
    <div class="bg-slate-800 p-4 rounded-[20px] text-white m-4 w-200 self-center">
        <h1 class="text-center">chat with your friend</h1>
        <br>

        <div id="messages" class="bg-slate-600 h-100 rounded-[30px]" style="position: relative; overflow: auto;">
            <br>
        </div>
        <br>
        <div class="bg-slate-700 flex rounded-[20px] gap-5 justify-center p-6">
            <input type="text" id="text" class="rounded-[20px] bg-white p-2 pl-4 pr-4 text-black" placeholder="type message ...">
            <button id="sendMessage" class="hover:bg-gray-950 hover:cursor-pointer flex gap-4 bg-gray-900 p-2 rounded-[6px]" style="transition: 0.1s;">sendMessage
                <span>
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
  <path stroke-linecap="round" stroke-linejoin="round" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5" />
</svg>

                </span>
            </button>
        </div>
    </div>

    <script>
        const socket = io("localhost:3000")
        let btn = document.getElementById("sendMessage")
        let text = document.getElementById("text")
        let online_container = document.getElementById("online")
        socket.on("online_users", (online_people) => {
            online_container.textContent = "online users: " + online_people
        })
        let container = document.getElementById("messages")
        btn.addEventListener("click" , () => {
            if(text.value.trim() == ""){
                alert("please type something")
            }else{
                
                socket.emit("Message" , text.value)
                let query = `
                <br>
                <div id="Mymessage" class="bg-gray-900 flex gap-4 w-100 text-white ml-70 pr-4 rounded-[30px] p-3">
                    <p class="opacity-[50%]">you:</p> ${text.value}    
                    </div>
                    `
                    container.innerHTML += query
                    text.value = ""
                }
        })
        socket.on("SendMessage" , (data) => {
            console.log("message: " , data)
            query = `         
            <br>
                <div id="Mymessage" class="bg-slate-700 flex gap-4 w-100 text-white pr-4 rounded-[30px] p-3">
                    <p class="opacity-[50%]">firend</p> ${data}    
                    </div>`
            container.innerHTML += query
            console.log("done")
        })
    </script>
</body>
</html>
